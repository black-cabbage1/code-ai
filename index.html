<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로또 점수 번호 추출기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --line: #d8e0e8;
      --control: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --yellow: #f2b705;
      --blue: #2673dd;
      --red: #df4b4b;
      --gray: #6b7280;
      --green: #22a06b;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #15171b;
      --panel: #20242a;
      --text: #f4f7fb;
      --muted: #aab4c2;
      --line: #3a414c;
      --control: #171b20;
      --accent: #14b8a6;
      --accent-dark: #0f9488;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .top {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 240px;
    }

    label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    select,
    input,
    button {
      height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      border: 1px solid var(--line);
      background: var(--control);
      color: var(--text);
      padding: 0 12px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .theme-button {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .theme-button:hover {
      background: var(--control);
    }

    button:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.24);
      outline-offset: 2px;
    }

    .content {
      padding: 26px 28px 30px;
    }

    .sets {
      display: grid;
      gap: 14px;
    }

    .set {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .set-title {
      color: var(--muted);
      font-weight: 700;
    }

    .balls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.15);
      user-select: none;
    }

    .n1 { background: var(--yellow); }
    .n2 { background: var(--blue); }
    .n3 { background: var(--red); }
    .n4 { background: var(--gray); }
    .n5 { background: var(--green); }

    @media (max-width: 680px) {
      body {
        padding: 16px;
        place-items: start center;
      }

      .top {
        padding: 22px 18px 18px;
        display: grid;
      }

      .controls {
        justify-content: stretch;
        min-width: 0;
      }

      select,
      button {
        flex: 1 1 140px;
      }

      .content {
        padding: 18px;
      }

      .set {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .ball {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>로또 점수 번호 추출기</h1>
        <p>무작위 후보를 만든 뒤 점수 조건으로 평가해서 높은 점수 조합을 보여줍니다.</p>
      </div>
      <div class="controls" aria-label="번호 추출 설정">
        <label for="setCount">게임 수</label>
        <select id="setCount">
          <option value="1">1게임</option>
          <option value="3">3게임</option>
          <option value="5" selected>5게임</option>
          <option value="10">10게임</option>
        </select>
        <label for="recentNumbers">최근 회차</label>
        <input id="recentNumbers" type="text" inputmode="numeric" placeholder="예: 3, 11, 18, 24, 32, 41">
        <button type="button" id="themeButton" class="theme-button" aria-pressed="false">다크모드</button>
        <button type="button" id="drawButton">번호 추출</button>
      </div>
    </section>

    <section class="content">
      <div id="sets" class="sets" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const setCount = document.querySelector("#setCount");
    const recentNumbers = document.querySelector("#recentNumbers");
    const themeButton = document.querySelector("#themeButton");
    const drawButton = document.querySelector("#drawButton");
    const sets = document.querySelector("#sets");
    const LOTTO_HISTORY = [
      { round: 1177, numbers: [3, 7, 15, 16, 19, 43], bonus: 21 },
      { round: 1176, numbers: [7, 9, 11, 21, 30, 35], bonus: 29 },
      { round: 1175, numbers: [3, 4, 6, 8, 32, 42], bonus: 31 },
      { round: 1174, numbers: [8, 11, 14, 17, 36, 39], bonus: 22 },
      { round: 1173, numbers: [1, 5, 18, 20, 30, 35], bonus: 3 },
      { round: 1172, numbers: [7, 9, 24, 29, 34, 38], bonus: 26 },
      { round: 1171, numbers: [3, 6, 7, 11, 12, 17], bonus: 19 },
      { round: 1170, numbers: [3, 13, 28, 34, 38, 42], bonus: 25 },
      { round: 1169, numbers: [5, 12, 24, 26, 39, 42], bonus: 20 },
      { round: 1168, numbers: [9, 21, 24, 30, 33, 37], bonus: 29 },
      { round: 1167, numbers: [8, 23, 31, 35, 39, 40], bonus: 24 },
      { round: 1166, numbers: [14, 23, 25, 27, 29, 42], bonus: 16 },
      { round: 1165, numbers: [6, 7, 27, 29, 38, 45], bonus: 17 },
      { round: 1164, numbers: [17, 18, 23, 25, 38, 39], bonus: 22 },
      { round: 1163, numbers: [2, 13, 15, 16, 33, 43], bonus: 4 },
      { round: 1162, numbers: [20, 21, 22, 25, 28, 29], bonus: 6 },
      { round: 1161, numbers: [2, 12, 20, 24, 34, 42], bonus: 37 },
      { round: 1160, numbers: [7, 13, 18, 36, 39, 45], bonus: 19 },
      { round: 1159, numbers: [3, 9, 27, 28, 38, 39], bonus: 7 },
      { round: 1158, numbers: [21, 25, 27, 32, 37, 38], bonus: 20 },
      { round: 1157, numbers: [5, 7, 12, 20, 25, 26], bonus: 28 },
      { round: 1156, numbers: [6, 9, 11, 12, 24, 30], bonus: 31 },
      { round: 1155, numbers: [10, 16, 19, 27, 37, 38], bonus: 13 },
      { round: 1154, numbers: [4, 8, 22, 26, 32, 38], bonus: 27 },
      { round: 1153, numbers: [1, 9, 10, 13, 35, 44], bonus: 5 },
      { round: 1152, numbers: [3, 8, 31, 32, 41, 43], bonus: 36 },
      { round: 1151, numbers: [2, 3, 9, 15, 27, 29], bonus: 8 },
      { round: 1150, numbers: [8, 9, 18, 35, 39, 45], bonus: 25 },
      { round: 1149, numbers: [8, 15, 19, 21, 32, 36], bonus: 38 },
      { round: 1148, numbers: [3, 6, 13, 15, 16, 22], bonus: 32 }
    ];

    const CONFIG = {
      candidateSize: 10000,
      recentWindow: 20,
      frequentTopCount: 12,
      allowedOddCounts: [2, 3, 4],
      sumMin: 100,
      sumMax: 180,
      idealSumMin: 120,
      idealSumMax: 160,
      minRangeCount: 3,
      bonusRangeCount: 4,
      minHighNumberCount: 1,
      bonusHighNumberCount: 2,
      maxConsecutivePairs: 2,
      maxSameLastDigitCount: 2,
      maxLatestOverlap: 2,
      maxSelectedOverlap: 3
    };

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      themeButton.textContent = theme === "dark" ? "화이트모드" : "다크모드";
      themeButton.setAttribute("aria-pressed", String(theme === "dark"));
      localStorage.setItem("lottoTheme", theme);
    }

    function getInitialTheme() {
      const savedTheme = localStorage.getItem("lottoTheme");

      if (savedTheme === "dark" || savedTheme === "light") {
        return savedTheme;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function getBallClass(number) {
      if (number <= 10) return "n1";
      if (number <= 20) return "n2";
      if (number <= 30) return "n3";
      if (number <= 40) return "n4";
      return "n5";
    }

    function drawNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const result = [];

      while (result.length < 6) {
        const index = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(index, 1)[0]);
      }

      return result.sort((a, b) => a - b);
    }

    function parseRecentNumbers(value) {
      return value
        .split(/[^0-9]+/)
        .map(Number)
        .filter((number, index, numbers) => (
          number >= 1 && number <= 45 && numbers.indexOf(number) === index
        ));
    }

    function getRangeCount(numbers) {
      return new Set(numbers.map((number) => {
        if (number <= 10) return 0;
        if (number <= 20) return 1;
        if (number <= 30) return 2;
        if (number <= 40) return 3;
        return 4;
      })).size;
    }

    function getConsecutivePairCount(numbers) {
      let count = 0;

      for (let i = 0; i < numbers.length - 1; i += 1) {
        if (numbers[i + 1] - numbers[i] === 1) count += 1;
      }

      return count;
    }

    function getMaxSameLastDigitCount(numbers) {
      const counts = new Map();

      numbers.forEach((number) => {
        const lastDigit = number % 10;
        counts.set(lastDigit, (counts.get(lastDigit) || 0) + 1);
      });

      return Math.max(...counts.values());
    }

    function isFamousPattern(numbers) {
      const joined = numbers.join(",");
      const differences = numbers.slice(1).map((number, index) => number - numbers[index]);
      const sameDifference = differences.every((difference) => difference === differences[0]);
      const decadeCounts = new Map();

      numbers.forEach((number) => {
        const decade = Math.floor((number - 1) / 10);
        decadeCounts.set(decade, (decadeCounts.get(decade) || 0) + 1);
      });

      return (
        joined === "1,2,3,4,5,6" ||
        joined === "40,41,42,43,44,45" ||
        sameDifference ||
        [...decadeCounts.values()].some((count) => count >= 5)
      );
    }

    function countOverlap(first, second) {
      return first.filter((number) => second.includes(number)).length;
    }

    function getTopFrequentNumbers(history, limit) {
      const counts = new Map();

      history.slice(0, limit).forEach((draw) => {
        draw.numbers.forEach((number) => {
          counts.set(number, (counts.get(number) || 0) + 1);
        });
      });

      return [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0] - b[0])
        .slice(0, CONFIG.frequentTopCount)
        .map(([number]) => number);
    }

    function passesFilters(numbers, latest) {
      const oddCount = numbers.filter((number) => number % 2 === 1).length;
      const total = numbers.reduce((sum, number) => sum + number, 0);
      const highCount = numbers.filter((number) => number >= 32 && number <= 45).length;

      return (
        CONFIG.allowedOddCounts.includes(oddCount) &&
        total >= CONFIG.sumMin &&
        total <= CONFIG.sumMax &&
        getConsecutivePairCount(numbers) <= CONFIG.maxConsecutivePairs &&
        getRangeCount(numbers) >= CONFIG.minRangeCount &&
        getMaxSameLastDigitCount(numbers) <= CONFIG.maxSameLastDigitCount &&
        highCount >= CONFIG.minHighNumberCount &&
        countOverlap(numbers, latest) <= CONFIG.maxLatestOverlap &&
        !numbers.every((number) => number <= 31) &&
        !isFamousPattern(numbers)
      );
    }

    function scoreNumbers(numbers, context) {
      let score = 100;
      const oddCount = numbers.filter((number) => number % 2 === 1).length;
      const evenCount = 6 - oddCount;
      const total = numbers.reduce((sum, number) => sum + number, 0);
      const highCount = numbers.filter((number) => number >= 32 && number <= 45).length;
      const consecutivePairs = getConsecutivePairCount(numbers);
      const latestOverlap = countOverlap(numbers, context.latest);
      const recentFrequentCount = countOverlap(numbers, context.recentFrequent);
      const allTimeFrequentCount = countOverlap(numbers, context.allTimeFrequent);

      if (oddCount === 3 && evenCount === 3) {
        score += 10;
      } else if (
        (oddCount === 2 && evenCount === 4) ||
        (oddCount === 4 && evenCount === 2)
      ) {
        score += 7;
      }

      if (total >= CONFIG.idealSumMin && total <= CONFIG.idealSumMax) {
        score += 10;
      } else if (total >= CONFIG.sumMin && total <= CONFIG.sumMax) {
        score += 5;
      } else {
        score -= 30;
      }

      if (getRangeCount(numbers) >= CONFIG.bonusRangeCount) {
        score += 10;
      }

      if (highCount >= CONFIG.bonusHighNumberCount) {
        score += 5;
      }

      if (consecutivePairs === 1) {
        score += 3;
      }

      if (recentFrequentCount >= 1 && recentFrequentCount <= 2) {
        score += 5;
      }

      if (allTimeFrequentCount >= 1 && allTimeFrequentCount <= 2) {
        score += 5;
      }

      if (latestOverlap === 2) {
        score -= 10;
      }

      if (getMaxSameLastDigitCount(numbers) >= 3) {
        score -= 20;
      }

      if (numbers.every((number) => number <= 31)) {
        score -= 20;
      }

      if (isFamousPattern(numbers)) {
        score -= 50;
      }

      return { score, total };
    }

    function getScoredNumbers(count) {
      const parsedRecent = parseRecentNumbers(recentNumbers.value);
      const latest = parsedRecent.length === 6 ? parsedRecent : LOTTO_HISTORY[0].numbers;
      const context = {
        latest,
        recentFrequent: getTopFrequentNumbers(LOTTO_HISTORY, CONFIG.recentWindow),
        allTimeFrequent: getTopFrequentNumbers(LOTTO_HISTORY, LOTTO_HISTORY.length)
      };
      const unique = new Map();
      let attempts = 0;
      const maxAttempts = CONFIG.candidateSize * 20;

      while (unique.size < CONFIG.candidateSize && attempts < maxAttempts) {
        attempts += 1;
        const numbers = drawNumbers();
        const key = numbers.join(",");
        if (!unique.has(key) && passesFilters(numbers, latest)) {
          unique.set(key, scoreNumbers(numbers, context));
        }
      }

      const selected = [];
      const scored = [...unique.entries()]
        .map(([key, data]) => ({ numbers: key.split(",").map(Number), ...data }))
        .sort((a, b) => b.score - a.score || Math.abs(140 - a.total) - Math.abs(140 - b.total));

      for (const item of scored) {
        const hasSimilarSelected = selected.some((selectedItem) => (
          countOverlap(item.numbers, selectedItem.numbers) > CONFIG.maxSelectedOverlap
        ));

        if (!hasSimilarSelected) selected.push(item);
        if (selected.length >= count) break;
      }

      return selected;
    }

    function render() {
      const count = Number(setCount.value);
      const fragment = document.createDocumentFragment();

      getScoredNumbers(count).forEach((item, index) => {
        const set = document.createElement("article");
        set.className = "set";

        const title = document.createElement("div");
        title.className = "set-title";
        title.textContent = `${index + 1}게임`;

        const balls = document.createElement("div");
        balls.className = "balls";

        item.numbers.forEach((number) => {
          const ball = document.createElement("span");
          ball.className = `ball ${getBallClass(number)}`;
          ball.textContent = number;
          balls.appendChild(ball);
        });

        set.append(title, balls);
        fragment.appendChild(set);
      });

      sets.replaceChildren(fragment);
    }

    applyTheme(getInitialTheme());
    themeButton.addEventListener("click", () => {
      applyTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
    });
    drawButton.addEventListener("click", render);
    setCount.addEventListener("change", render);
    recentNumbers.addEventListener("change", render);
    render();
  </script>
</body>
</html>
