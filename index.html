<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로또 당첨번호 추출기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --line: #d8e0e8;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --yellow: #f2b705;
      --blue: #2673dd;
      --red: #df4b4b;
      --gray: #6b7280;
      --green: #22a06b;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .top {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 240px;
    }

    label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    select,
    button {
      height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 0 36px 0 12px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.24);
      outline-offset: 2px;
    }

    .content {
      padding: 26px 28px 30px;
    }

    .sets {
      display: grid;
      gap: 14px;
    }

    .set {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .set-title {
      color: var(--muted);
      font-weight: 700;
    }

    .balls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.15);
      user-select: none;
    }

    .n1 { background: var(--yellow); }
    .n2 { background: var(--blue); }
    .n3 { background: var(--red); }
    .n4 { background: var(--gray); }
    .n5 { background: var(--green); }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 680px) {
      body {
        padding: 16px;
        place-items: start center;
      }

      .top {
        padding: 22px 18px 18px;
        display: grid;
      }

      .controls {
        justify-content: stretch;
        min-width: 0;
      }

      select,
      button {
        flex: 1 1 140px;
      }

      .content {
        padding: 18px;
      }

      .set {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .ball {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>로또 당첨번호 추출기</h1>
        <p>1부터 45까지 중복 없이 6개의 번호를 무작위로 추출합니다.</p>
      </div>
      <div class="controls" aria-label="번호 추출 설정">
        <label for="setCount">게임 수</label>
        <select id="setCount">
          <option value="1">1게임</option>
          <option value="3">3게임</option>
          <option value="5" selected>5게임</option>
          <option value="10">10게임</option>
        </select>
        <button type="button" id="drawButton">번호 추출</button>
      </div>
    </section>

    <section class="content">
      <div id="sets" class="sets" aria-live="polite"></div>
      <p class="hint">각 게임의 번호는 오름차순으로 정렬됩니다.</p>
    </section>
  </main>

  <script>
    const setCount = document.querySelector("#setCount");
    const drawButton = document.querySelector("#drawButton");
    const sets = document.querySelector("#sets");

    function getBallClass(number) {
      if (number <= 10) return "n1";
      if (number <= 20) return "n2";
      if (number <= 30) return "n3";
      if (number <= 40) return "n4";
      return "n5";
    }

    function drawNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const result = [];

      while (result.length < 6) {
        const index = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(index, 1)[0]);
      }

      return result.sort((a, b) => a - b);
    }

    function render() {
      const count = Number(setCount.value);
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < count; i += 1) {
        const set = document.createElement("article");
        set.className = "set";

        const title = document.createElement("div");
        title.className = "set-title";
        title.textContent = `${i + 1}게임`;

        const balls = document.createElement("div");
        balls.className = "balls";

        drawNumbers().forEach((number) => {
          const ball = document.createElement("span");
          ball.className = `ball ${getBallClass(number)}`;
          ball.textContent = number;
          balls.appendChild(ball);
        });

        set.append(title, balls);
        fragment.appendChild(set);
      }

      sets.replaceChildren(fragment);
    }

    drawButton.addEventListener("click", render);
    setCount.addEventListener("change", render);
    render();
  </script>
</body>
</html>
