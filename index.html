<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로또 점수 번호 추출기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --line: #d8e0e8;
      --control: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --yellow: #f2b705;
      --blue: #2673dd;
      --red: #df4b4b;
      --gray: #6b7280;
      --green: #22a06b;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #15171b;
      --panel: #20242a;
      --text: #f4f7fb;
      --muted: #aab4c2;
      --line: #3a414c;
      --control: #171b20;
      --accent: #14b8a6;
      --accent-dark: #0f9488;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .top {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 240px;
    }

    label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    select,
    input,
    button {
      height: 42px;
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      border: 1px solid var(--line);
      background: var(--control);
      color: var(--text);
      padding: 0 12px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .theme-button {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .theme-button:hover {
      background: var(--control);
    }

    button:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.24);
      outline-offset: 2px;
    }

    .content {
      padding: 26px 28px 30px;
    }

    .sets {
      display: grid;
      gap: 14px;
    }

    .set {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .set-title {
      color: var(--muted);
      font-weight: 700;
    }

    .balls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.15);
      user-select: none;
    }

    .n1 { background: var(--yellow); }
    .n2 { background: var(--blue); }
    .n3 { background: var(--red); }
    .n4 { background: var(--gray); }
    .n5 { background: var(--green); }

    @media (max-width: 680px) {
      body {
        padding: 16px;
        place-items: start center;
      }

      .top {
        padding: 22px 18px 18px;
        display: grid;
      }

      .controls {
        justify-content: stretch;
        min-width: 0;
      }

      select,
      button {
        flex: 1 1 140px;
      }

      .content {
        padding: 18px;
      }

      .set {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .ball {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>로또 점수 번호 추출기</h1>
        <p>무작위 후보를 만든 뒤 점수 조건으로 평가해서 높은 점수 조합을 보여줍니다.</p>
      </div>
      <div class="controls" aria-label="번호 추출 설정">
        <label for="setCount">게임 수</label>
        <select id="setCount">
          <option value="1">1게임</option>
          <option value="3">3게임</option>
          <option value="5" selected>5게임</option>
          <option value="10">10게임</option>
        </select>
        <label for="recentNumbers">최근 회차</label>
        <input id="recentNumbers" type="text" inputmode="numeric" placeholder="예: 3, 11, 18, 24, 32, 41">
        <button type="button" id="themeButton" class="theme-button" aria-pressed="false">다크모드</button>
        <button type="button" id="drawButton">번호 추출</button>
      </div>
    </section>

    <section class="content">
      <div id="sets" class="sets" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const setCount = document.querySelector("#setCount");
    const recentNumbers = document.querySelector("#recentNumbers");
    const themeButton = document.querySelector("#themeButton");
    const drawButton = document.querySelector("#drawButton");
    const sets = document.querySelector("#sets");
    const CANDIDATE_SIZE = 600;

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      themeButton.textContent = theme === "dark" ? "화이트모드" : "다크모드";
      themeButton.setAttribute("aria-pressed", String(theme === "dark"));
      localStorage.setItem("lottoTheme", theme);
    }

    function getInitialTheme() {
      const savedTheme = localStorage.getItem("lottoTheme");

      if (savedTheme === "dark" || savedTheme === "light") {
        return savedTheme;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function getBallClass(number) {
      if (number <= 10) return "n1";
      if (number <= 20) return "n2";
      if (number <= 30) return "n3";
      if (number <= 40) return "n4";
      return "n5";
    }

    function drawNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const result = [];

      while (result.length < 6) {
        const index = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(index, 1)[0]);
      }

      return result.sort((a, b) => a - b);
    }

    function parseRecentNumbers(value) {
      return value
        .split(/[^0-9]+/)
        .map(Number)
        .filter((number, index, numbers) => (
          number >= 1 && number <= 45 && numbers.indexOf(number) === index
        ));
    }

    function getRangeCount(numbers) {
      return new Set(numbers.map((number) => Math.floor((number - 1) / 10))).size;
    }

    function getConsecutivePairCount(numbers) {
      let count = 0;

      for (let i = 0; i < numbers.length - 1; i += 1) {
        if (numbers[i + 1] - numbers[i] === 1) count += 1;
      }

      return count;
    }

    function hasSameLastDigitPenalty(numbers) {
      const counts = new Map();

      numbers.forEach((number) => {
        const lastDigit = number % 10;
        counts.set(lastDigit, (counts.get(lastDigit) || 0) + 1);
      });

      return [...counts.values()].some((count) => count >= 3);
    }

    function isFamousPattern(numbers) {
      const joined = numbers.join(",");
      const differences = numbers.slice(1).map((number, index) => number - numbers[index]);
      const sameDifference = differences.every((difference) => difference === differences[0]);
      const decadeCounts = new Map();

      numbers.forEach((number) => {
        const decade = Math.floor((number - 1) / 10);
        decadeCounts.set(decade, (decadeCounts.get(decade) || 0) + 1);
      });

      return (
        joined === "1,2,3,4,5,6" ||
        joined === "40,41,42,43,44,45" ||
        sameDifference ||
        [...decadeCounts.values()].some((count) => count >= 5)
      );
    }

    function scoreNumbers(numbers, recent) {
      let score = 100;
      const oddCount = numbers.filter((number) => number % 2 === 1).length;
      const evenCount = 6 - oddCount;
      const total = numbers.reduce((sum, number) => sum + number, 0);
      const highCount = numbers.filter((number) => number >= 32 && number <= 45).length;
      const consecutivePairs = getConsecutivePairCount(numbers);
      const overlap = numbers.filter((number) => recent.includes(number)).length;

      if (oddCount === 3 && evenCount === 3) {
        score += 10;
      } else if (
        (oddCount === 2 && evenCount === 4) ||
        (oddCount === 4 && evenCount === 2)
      ) {
        score += 7;
      }

      if (total >= 120 && total <= 160) {
        score += 10;
      } else if (total >= 100 && total <= 180) {
        score += 5;
      }

      if (getRangeCount(numbers) >= 4) {
        score += 10;
      }

      if (highCount >= 2) {
        score += 5;
      }

      if (consecutivePairs === 1) {
        score += 3;
      }

      if (recent.length >= 6 && overlap >= 3) {
        score -= 30;
      }

      if (hasSameLastDigitPenalty(numbers)) {
        score -= 20;
      }

      if (numbers.every((number) => number <= 31)) {
        score -= 20;
      }

      if (isFamousPattern(numbers)) {
        score -= 50;
      }

      return { score, total };
    }

    function getScoredNumbers(count) {
      const recent = parseRecentNumbers(recentNumbers.value);
      const unique = new Map();

      while (unique.size < CANDIDATE_SIZE) {
        const numbers = drawNumbers();
        const key = numbers.join(",");
        if (!unique.has(key)) unique.set(key, scoreNumbers(numbers, recent));
      }

      return [...unique.entries()]
        .map(([key, data]) => ({ numbers: key.split(",").map(Number), ...data }))
        .sort((a, b) => b.score - a.score || Math.abs(140 - a.total) - Math.abs(140 - b.total))
        .slice(0, count);
    }

    function render() {
      const count = Number(setCount.value);
      const fragment = document.createDocumentFragment();

      getScoredNumbers(count).forEach((item, index) => {
        const set = document.createElement("article");
        set.className = "set";

        const title = document.createElement("div");
        title.className = "set-title";
        title.textContent = `${index + 1}게임`;

        const balls = document.createElement("div");
        balls.className = "balls";

        item.numbers.forEach((number) => {
          const ball = document.createElement("span");
          ball.className = `ball ${getBallClass(number)}`;
          ball.textContent = number;
          balls.appendChild(ball);
        });

        set.append(title, balls);
        fragment.appendChild(set);
      });

      sets.replaceChildren(fragment);
    }

    applyTheme(getInitialTheme());
    themeButton.addEventListener("click", () => {
      applyTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
    });
    drawButton.addEventListener("click", render);
    setCount.addEventListener("change", render);
    recentNumbers.addEventListener("change", render);
    render();
  </script>
</body>
</html>
